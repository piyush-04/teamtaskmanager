services:
  - type: web
    name: teamtaskmanager
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: teamtaskmanager-db
          property: connectionString

databases:
  - name: teamtaskmanager-db
    plan: free
    databaseName: teamtaskmanager
    user: teamtaskmanager_user
